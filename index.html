<head>
<meta charset="UTF-8">

}

.card{

</style></head><body><header>
C-SERVICE BUSINESS 💼 | PAIEMENT & SERVICES
</header><div class="container"><h2>Choisis ton service</h2><div class="card">
🌐 Site Web Pro - 50$
<button class="pay" onclick="payer('Site Web Pro',50)">Payer</button>
</div><div class="card">
🎬 Montage Vidéo - 30$
<button class="pay" onclick="payer('Montage Vidéo',30)">Payer</button>
</div><div class="card">
🎨 Design Logo - 20$
<button class="pay" onclick="payer('Design Logo',20)">Payer</button>
</div><!-- PAY BOX --><div class="paybox">
<h3>Paiement rapide</h3><input id="nom" placeholder="Ton nom"><br>
<input id="tel" placeholder="Téléphone"><br>

<button class="whatsapp" onclick="whatsapp()">Commander via WhatsApp</button>

</div></div><footer>
© 2026 C-SERVICE BUSINESS
</footer><script>

let serviceChoisi = "";

function payer(service, prix){
serviceChoisi = service;

alert("Service: " + service + "\nPrix: " + prix + "$\n\n👉 Paiement manuel activé");

window.open("https://wa.me/243848681325?text=Je%20veux%20payer%20" + service + "%20-%20" + prix + "$");
}

function whatsapp(){
let nom = document.getElementById("nom").value;
let tel = document.getElementById("tel").value;

let msg = "Bonjour je suis " + nom + " (" + tel + ") je veux commander un service.";

window.open("https://wa.me/243850406200?text=" + encodeURIComponent(msg));
}

</script></body>
