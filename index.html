<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>C-SERVICE BUSINESS | PRO MAX</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* HEADER */
header{
padding:18px;
background:#0f172a;
text-align:center;
color:#38bdf8;
font-size:20px;
font-weight:bold;
}

/* MENU */
nav{
display:flex;
justify-content:space-around;
background:#111827;
padding:10px;
position:sticky;
top:0;
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
}

/* BUTTON APP */
.app-btn{
text-align:center;
margin:15px;
}

.app-btn a{
background:#38bdf8;
color:white;
padding:12px 18px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

/* CONTAINER */
.container{
padding:20px;
text-align:center;
}

.card{
background:#1e293b;
padding:20px;
margin:10px;
border-radius:10px;
}

/* BUTTONS */
button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.pay{background:#22c55e;}
.whatsapp{background:#25D366;color:white;}

/* FLOAT WHATSAPP */
.float-wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:12px 15px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:#0f172a;
margin-top:30px;
font-size:12px;
}
</style>

</head>
<body>

<header>
C-SERVICE BUSINESS 💼 | PRO MAX
</header>

<!-- MENU -->
<nav>
<a href="#">Accueil</a>
<a href="#">Services</a>
<a href="#">Paiement</a>
<a href="https://haddock619.github.io/c-service-businness/">Site</a>
</nav>

<!-- BOUTON OUVRIR APP -->
<div class="app-btn">
<a href="intent://haddock619.github.io/c-service-businness/#Intent;scheme=https;package=com.webtoapp;end">
📱 Ouvrir l'application
</a>
</div>

<div class="container">

<h2>Choisis ton service</h2>

<div class="card">
🌐 Site Web Pro - 50$
<button class="pay" onclick="payer('Site Web Pro',50)">Payer</button>
</div>

<div class="card">
🎬 Montage Vidéo - 30$
<button class="pay" onclick="payer('Montage Vidéo',30)">Payer</button>
</div>

<div class="card">
🎨 Design Logo - 20$
<button class="pay" onclick="payer('Design Logo',20)">Payer</button>
</div>

<!-- CONTACT -->
<div class="card">
<h3>Commande rapide</h3>
<input id="nom" placeholder="Ton nom"><br><br>
<input id="tel" placeholder="Téléphone"><br><br>

<button class="whatsapp" onclick="whatsapp()">
Commander via WhatsApp
</button>
</div>

</div>

<!-- FLOAT WHATSAPP -->
<a class="float-wa"
href="https://wa.me/243848681325?text=Bonjour%20je%20veux%20commander">
💬 WhatsApp
</a>

<footer>
© 2026 C-SERVICE BUSINESS | Tous droits réservés
</footer>

<script>
function payer(service, prix){
window.open("https://wa.me/243848681325?text=Je%20veux%20payer%20"+service+"%20-"+prix+"$");
}

function whatsapp(){
let nom=document.getElementById("nom").value;
let tel=document.getElementById("tel").value;

let msg="Bonjour je suis "+nom+" ("+tel+") je veux commander un service.";

window.open("https://wa.me/243848681325?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
